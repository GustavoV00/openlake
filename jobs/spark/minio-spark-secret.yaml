# Static S3 creds for Spark jobs on kind — injected as env (AWS_*), read by the
# S3A EnvironmentVariableCredentialsProvider. Must match the deepstore tenant root
# creds (minioadmin/minioadmin). Applied out-of-band with the job.
# ponytail: plaintext for local kind only; aws uses IRSA on spark-operator-spark, no secret.
apiVersion: v1
kind: Secret
metadata:
  name: minio-spark-secret
  namespace: processing
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
