# Secrets the hive-metastore chart consumes via existingSecret.
# Local-only static values — safe to commit for kind, NOT for aws.
# ponytail: plaintext for local kind; swap to IRSA (s3) + a real secret store on aws.
---
apiVersion: v1
kind: Secret
metadata:
  name: hive-metastore-db-credentials
  namespace: metastore
type: Opaque
stringData:
  username: hive
  password: hive
---
apiVersion: v1
kind: Secret
metadata:
  name: hive-metastore-s3-credentials
  namespace: metastore
type: Opaque
stringData:
  # Must match deepstore MinIO rootUser/rootPassword.
  access-key: minioadmin
  secret-key: minioadmin
