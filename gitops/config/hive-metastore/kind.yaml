# Hive Metastore config — kind only. At M6, split the env-agnostic parts into a
# base.yaml and add aws.yaml (published image + IRSA instead of the static S3 secret).
image:
  name: hive-metastore
  tag: "3.1.3"
  pullPolicy: IfNotPresent   # use the kind-loaded local image
database:
  host: metastore-pg   # external Postgres container on kind's docker network — scripts/local-postgres.sh
  port: 5432
  name: metastore_db
  existingSecret:
    name: hive-metastore-db-credentials
s3:
  # The operator tenant's S3 service `minio` listens on :80 (→ pod :9000); :9000
  # only exists on the headless `deepstore-hl`. Clients must use :80.
  endpoint: http://minio.deepstore.svc.cluster.local:80
  pathStyleAccess: true
  sslEnabled: false
  existingSecret:
    name: hive-metastore-s3-credentials
# The chart's metastore-site template hardcodes metastore.task.threads.always with
# MaterializationsCacheCleanerTask — a 4.x-only class absent in 3.1.3 (crashes HMS
# init). Override with the real 3.1.3 default (appended later in the XML → wins).
extraConfParams: "metastore.task.threads.always:org.apache.hadoop.hive.metastore.events.EventCleanerTask,org.apache.hadoop.hive.metastore.RuntimeStatsCleanerTask"
schemaInit:
  # ponytail: idempotent (-info || -initSchema); with >1 replica each pod runs it
  # on start. Safe once the schema exists; a truly-empty DB with 2 pods starting
  # at once could race on -initSchema. Init once manually if that ever bites.
  enabled: true
# HPA owns the replica count (chart omits static replicas when autoscaling.enabled),
# so minReplicas is the floor. Needs metrics-server for CPU/mem targets to actually
# scale; without it, replicas hold at minReplicas.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 90
  targetMemoryUtilizationPercentage: 90
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
