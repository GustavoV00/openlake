# M2 — Hive Metastore: the shared Iceberg catalog. Both Spark (M3) and Trino (M4)
# register/read tables here. Chart lives in the project's own (private) repo.
#
# NOTE: the chart has no published image — build it and load into kind first:
#   scripts/load-hms-image.sh
# Until then this Application syncs but the pod stays ImagePullBackOff.
#
# Postgres is external (never in-cluster) — set database.host in the values file.
# Multi-source:
#   1. openlake (ref: values)  → the $values used by valueFiles below
#   2. helm-hive-metastore     → the chart (private repo, repo-hive-metastore cred)
#   3. openlake (path: gitops/config/hive-metastore/manifests) → raw K8s objects the chart
#      consumes: the two existingSecrets (external-DB + S3 creds), plus any
#      future ConfigMaps. Committed plaintext — MVP only; moves to Vault later.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-metastore
  namespace: gitops
spec:
  project: default
  sources:
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/GustavoV00/helm-hive-metastore.git
      targetRevision: HEAD
      path: .
      helm:
        valueFiles:
          - $values/gitops/config/hive-metastore/kind.yaml
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      path: gitops/config/hive-metastore/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: metastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
