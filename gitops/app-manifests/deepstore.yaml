# M2 — deepstore: MinIO providing the S3 API on kind (buckets raw + warehouse).
# The cloud env uses real S3 instead, so this Application exists only on kind.
# ponytail: standalone MinIO via its own chart, not the MinIO Operator/Tenant —
# an operator is overkill for a single-node local S3.
#
# Multi-source: chart is VENDORED (pristine upstream minio 5.4.0) under
# gitops/helm-charts/deepstore — no external charts.min.io fetch. Our config lives
# in gitops/config/deepstore/ (exposed as $values), not inline or in the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deepstore
  namespace: gitops
spec:
  project: default
  sources:
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      path: gitops/helm-charts/deepstore
      helm:
        valueFiles:
          - $values/gitops/config/deepstore/kind.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: deepstore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
