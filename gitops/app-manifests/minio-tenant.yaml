# M2 — minio-tenant (deepstore): a MinIO Tenant CR providing the S3 API on kind
# (buckets raw + warehouse). The cloud env uses real S3 instead, so this exists
# only on kind. Wave 0 → runs after minio-operator (wave -1) installs the CRDs.
#
# Multi-source: chart is VENDORED (pristine upstream tenant 7.1.1) under
# gitops/helm-charts/minio-tenant. Config lives in gitops/config/minio-tenant/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-tenant
  namespace: gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/GustavoV00/openlake.git
      targetRevision: HEAD
      path: gitops/helm-charts/minio-tenant
      helm:
        valueFiles:
          - $values/gitops/config/minio-tenant/kind.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: deepstore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
