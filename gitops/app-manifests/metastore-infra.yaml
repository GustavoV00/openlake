# M2 — metastore infra: namespace, in-cluster Postgres, and the secrets the
# hive-metastore chart references via existingSecret. Applied from this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metastore-infra
  namespace: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/GustavoV00/openlake.git
    targetRevision: HEAD
    path: gitops/metastore
  destination:
    server: https://kubernetes.default.svc
    namespace: metastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
